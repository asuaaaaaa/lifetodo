<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f2ea">
    <title>LifeTodo</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="../../design-system/tokens.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-panel" aria-label="手机端">
        <header class="topbar">
          <div>
            <p class="eyebrow">LifeTodo</p>
            <h1>今天</h1>
            <p class="sync-mode"><span data-sync-mode>连接中</span> · <span data-home-id>demo-home</span></p>
          </div>
          <button class="icon-button" id="resetData" type="button" aria-label="重置数据" title="重置数据">↺</button>
        </header>

        <nav class="segmented" aria-label="视图切换">
          <button class="segment active" type="button" data-view="today">今日</button>
          <button class="segment" type="button" data-view="tasks">任务</button>
          <button class="segment" type="button" data-view="members">成员</button>
          <button class="segment" type="button" data-view="device">设备</button>
        </nav>

        <section class="view active" id="todayView">
          <div class="summary-strip" id="summaryStrip"></div>
          <div class="member-list" id="todayList"></div>
        </section>

        <section class="view" id="tasksView">
          <form class="task-form" id="taskForm">
            <label>
              <span>事项</span>
              <input name="title" required placeholder="比如：铲猫砂盆">
            </label>
            <label id="singleAssigneeField">
              <span>选择成员 (支持循环 · 一人一次)</span>
              <select name="assigneeId" id="assigneeSelect"></select>
            </label>
            <div id="cycleAssigneeField" class="hidden">
              <span>勾选参与循环成员 (打卡后一人一次轮流)</span>
              <div class="checkbox-group" id="cycleMembersContainer"></div>
            </div>
            <label>
              <span>周期</span>
              <select name="recurrenceType" id="recurrenceType">
                <option value="intervalDays">每 N 天</option>
                <option value="weekly">每周</option>
                <option value="monthlyDate">每月固定日期</option>
              </select>
            </label>
            <div class="form-grid">
              <label data-recurrence-field="intervalDays">
                <span>间隔天数</span>
                <input name="intervalEvery" type="number" min="1" max="60" value="3">
              </label>
              <label data-recurrence-field="weekly">
                <span>星期</span>
                <select name="weekday">
                  <option value="1">周一</option>
                  <option value="2">周二</option>
                  <option value="3">周三</option>
                  <option value="4">周四</option>
                  <option value="5">周五</option>
                  <option value="6">周六</option>
                  <option value="0">周日</option>
                </select>
              </label>
              <label data-recurrence-field="monthlyDate">
                <span>每月日期</span>
                <input name="monthDay" type="number" min="1" max="31" value="1">
              </label>
            </div>
            <button class="primary-button" type="submit">添加</button>
          </form>
          <div class="task-list" id="allTasks"></div>
        </section>

        <section class="view" id="membersView">
          <form class="task-form" id="memberForm">
            <label>
              <span>成员名称</span>
              <input name="name" required placeholder="比如：妈妈">
            </label>
            <label>
              <span>颜色</span>
              <input name="color" type="color" value="#ef7f65">
            </label>
            <button class="primary-button" type="submit">添加成员</button>
          </form>
          <div class="task-list" id="memberManager"></div>
        </section>

        <section class="view" id="deviceView">
          <form class="task-form" id="deviceForm">
            <label>
              <span>设备名称</span>
              <input name="name" required placeholder="比如：玄关屏">
            </label>
            <label>
              <span>设备 ID</span>
              <input name="deviceId" required placeholder="比如：entry-screen">
            </label>
            <label>
              <span>位置</span>
              <input name="location" placeholder="比如：门口">
            </label>
            <button class="primary-button" type="submit">添加设备</button>
          </form>
          <div class="task-list" id="deviceManager"></div>
        </section>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>

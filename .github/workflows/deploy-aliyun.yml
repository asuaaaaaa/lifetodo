name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript
        run: |
          node --check apps/pwa-prototype/app.js
          node --check apps/pwa-prototype/firebase-store.js
          node --check scripts/prepare-static-deploy.mjs

      - name: Build static site
        run: node scripts/prepare-static-deploy.mjs

      - name: Upload site to Aliyun lightweight server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "dist/site/*"
          target: ${{ secrets.ALIYUN_DEPLOY_PATH || '/var/www/lifetodo/dist/site' }}
          strip_components: 2
          rm: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            if command -v nginx >/dev/null 2>&1; then
              sudo nginx -t
              sudo systemctl reload nginx
            fi

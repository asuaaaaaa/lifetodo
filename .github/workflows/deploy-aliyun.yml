name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript
        run: |
          node --check api/server.mjs
          node --check api/lark-base-store.mjs
          node --check apps/pwa-prototype/app.js
          node --check apps/pwa-prototype/lifetodo-store.js
          node --check scripts/prepare-static-deploy.mjs

      - name: Build static site
        run: node scripts/prepare-static-deploy.mjs

      - name: Upload site to Aliyun lightweight server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "dist/site"
          target: ${{ secrets.ALIYUN_DEPLOY_PATH || '/var/www/lifetodo/dist/site' }}
          strip_components: 1
          # overwrite: true
          rm: true

      - name: Upload API runtime to Aliyun lightweight server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "api,package.json"
          target: ${{ secrets.ALIYUN_APP_PATH || '/var/www/lifetodo' }}
          rm: false

      - name: Restart API and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            if sudo systemctl list-unit-files lifetodo-api.service >/dev/null 2>&1; then
              sudo systemctl restart lifetodo-api
              sudo systemctl --no-pager --full status lifetodo-api
            else
              echo "lifetodo-api.service is not installed yet; skipping API restart"
            fi

            if command -v nginx >/dev/null 2>&1; then
              sudo nginx -t
              if sudo systemctl is-active --quiet nginx; then
                sudo systemctl reload nginx
              elif sudo systemctl list-unit-files nginx.service >/dev/null 2>&1; then
                sudo systemctl start nginx
              else
                sudo nginx
              fi
            else
              echo "nginx is not installed on the server"
              exit 1
            fi
